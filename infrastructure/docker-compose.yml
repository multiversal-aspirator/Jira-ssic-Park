services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: jira-sick-park-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      # Mount vector database for persistence
      - ../vector_db:/app/vector_db
      # Mount Messages folder for Teams message processing
      - ../Messages:/Messages:ro
      # Mount .env file for environment variables
      - ../.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/project/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.jirassicpark.description=FastAPI backend service"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: jira-sick-park-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    labels:
      - "com.jirassicpark.description=React frontend with Nginx"

volumes:
  # Named volumes for persistence
  vector_db:
    driver: local

networks:
  app-network:
    driver: bridge
